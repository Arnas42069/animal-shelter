<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <title>Prieglauda</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Prieglaudos puslapio stiliai -->
    <link rel="stylesheet" href="/assets/css/prieglauda.css" />

    <!-- Bendri komponentai -->
    <link rel="stylesheet" href="/assets/css/navbar.css" />
    <link rel="stylesheet" href="/assets/css/auth-modals.css" />
    <link rel="stylesheet" href="/assets/css/footer.css" />
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>

  <body>
    <!-- Navbar vieta -->
    <header id="site-navbar"></header>

    <div id="auth-modals-root"></div>

    <!-- Sviesus vidinis puslapio blokas -->
    <div class="container-gaps" id="shelterProfilePage">
      <!-- Virsutine prieglaudos nuotrauka -->
      <div class="shelter-image">
        <img src="/assets/img/prieglauda.png" alt="Prieglaudos nuotrauka" />
      </div>

      <!-- Virsutinis prieglaudos blokas -->
      <div class="shelter-name">
        <div class="shelter-title-block">
          <!-- Perziuros rezimas -->
          <div id="shelterHeaderView">
            <h1 id="shelterNameView">Prieglaudos pavadinimas</h1>

            <div class="location-row">
              <img src="/assets/svg/pointer.svg" alt="Vieta" class="contact-icon" />
              <p class="shelter-address" id="shelterAddressView">Klaipėda, nežinau g.</p>
            </div>
          </div>

          <!-- Edit rezimas -->
          <!-- Sitas blokas turi buti matomas tik redagavimo rezime -->
          <div id="shelterHeaderEdit" class="inline-edit-block" hidden>
            <label for="editShelterName" class="edit-label">Prieglaudos pavadinimas:</label>
            <input
              type="text"
              id="editShelterName"
              class="input-title"
              placeholder="Prieglaudos pavadinimas"
            />
          </div>
        </div>
      </div>

      <!-- Aprasymo sekcija -->
      <section class="section">
        <h3>Aprašymas</h3>

        <!-- Perziuros rezimas -->
        <p id="shelterDescriptionView">
          Čia bus prieglaudos aprašymas.
        </p>

        <!-- Edit rezimas -->
        <div id="shelterDescriptionEditWrap" hidden>
          <label for="editShelterDescription" class="edit-label">Prieglaudos aprašymas:</label>
          <textarea
            id="editShelterDescription"
            class="edit-textarea"
            rows="6"
            placeholder="Įrašykite prieglaudos aprašymą"
          ></textarea>
        </div>
      </section>

      <!-- Kontaktu sekcija -->
      <section class="section contacts-section">
        <div class="section-header">
          <h3>Kontaktai</h3>

          <div class="section-header-actions">
            <button class="btn" id="toggleShelterEditBtn" type="button" hidden>
              Redaguoti informaciją
            </button>

            <button class="btn" id="saveShelterBtn" type="button" hidden>
              Išsaugoti
            </button>
          </div>
        </div>

        <!-- Perziuros rezimas -->
        <div id="shelterContactsView" class="contact-list">
          <p>
            <img src="/assets/svg/phone.svg" alt="Telefonas" class="contact-icon" />
            <span id="shelterPhoneView">+37060000000</span>
          </p>

          <p>
            <img src="/assets/svg/mail.svg" alt="El. paštas" class="contact-icon" />
            <span id="shelterEmailView">prieglauda@yahoo.com</span>
          </p>

          <!-- Svetaine rodoma tik jei ji ivesta -->
          <p id="shelterWebsiteRow" hidden>
            <img src="/assets/svg/website.svg" alt="Svetainė" class="contact-icon" />
            <a id="shelterWebsiteView" href="#" target="_blank" rel="noopener noreferrer"></a>
          </p>
        </div>

        <!-- Edit rezimas -->
        <div id="shelterContactsEdit" class="edit-form" hidden>
          <label for="editShelterCity" class="edit-label">Miestas:</label>
          <input
            type="text"
            id="editShelterCity"
            placeholder="Miestas"
          />

          <label for="editShelterContactAddress" class="edit-label">Adresas:</label>
          <input
            type="text"
            id="editShelterContactAddress"
            placeholder="Adresas"
          />

          <label for="editShelterPhone" class="edit-label">Telefono numeris:</label>
          <input
            type="text"
            id="editShelterPhone"
            placeholder="Telefono numeris"
          />

          <label for="editShelterEmail" class="edit-label">El. paštas:</label>
          <input
            type="email"
            id="editShelterEmail"
            placeholder="El. paštas"
          />

          <label for="editShelterWebsite" class="edit-label">Svetainė:</label>
          <input
            type="text"
            id="editShelterWebsite"
            placeholder="Svetainė"
          />

          <label for="editShelterPostalCode" class="edit-label">Pašto kodas:</label>
          <input
            type="text"
            id="editShelterPostalCode"
            placeholder="Pašto kodas"
          />

          <label for="editShelterCountry" class="edit-label">Šalis:</label>
          <input
            type="text"
            id="editShelterCountry"
            placeholder="Šalis"
          />
        </div>

        <!-- Zinute po shelter veiksmais -->
        <p id="shelterMessage" class="shelter-message"></p>
      </section>

      <!-- Statistika -->
      <section class="section stats-section">
        <div class="stats-grid">
          <div class="stat-card">
            <img src="/assets/svg/paw-outline.svg" alt="Pėdutės" class="paw-hover-icon" />
            <p>Turime:</p>
            <strong id="availableAnimalsCount">0</strong>
          </div>

          <div class="stat-card">
            <img src="/assets/svg/paw2.svg" alt="Pėdutės" class="paw-hover-icon" />
            <p>Rado namus:</p>
            <strong id="adoptedAnimalsCount">0</strong>
          </div>

          <div class="stat-card">
            <img src="/assets/svg/paw-outline.svg" alt="Pėdutės" class="paw-hover-icon" />
            <p>Savanoriai:</p>
            <strong>??</strong>
          </div>
        </div>
      </section>

            <!-- Gyvunu sekcija -->
      <section class="animals">
        <div class="animals-header">
          <h2 id="gyvunai">Gyvūnai</h2>

          <!-- Mygtukas naujo gyvuno sukurimui -->
          <button class="btn" id="openCreateAnimalBtn" type="button" hidden>
            Pridėti gyvūną
          </button>
        </div>

        <!-- Filtrai ir rikiavimas -->
        <div class="animals-toolbar">
          <div class="animals-filters">
            <!-- Filtras pagal rusi -->
            <select id="filterSpecies">
              <option value="">Visos rūšys</option>
              <option value="dog">Šuo</option>
              <option value="cat">Katė</option>
              <option value="other">Kitas</option>
            </select>

            <!-- Filtras pagal veisle -->
            <select id="filterBreed">
              <option value="">Visos veislės</option>
            </select>

            <!-- Filtras pagal lyti -->
            <select id="filterSex">
              <option value="">Visos lytys</option>
              <option value="male">Patinas</option>
              <option value="female">Patelė</option>
              <option value="unknown">Nežinoma</option>
            </select>

            <!-- Filtras pagal statusa -->
            <select id="filterStatus">
              <option value="">Visi statusai</option>
              <option value="available">Available</option>
              <option value="reserved">Reserved</option>
              <option value="adopted">Adopted</option>
              <option value="foster">Foster</option>
              <option value="medical_hold">Medical hold</option>
              <option value="lost">Lost</option>
            </select>
          </div>

          <div class="animals-sort">
            <!-- Rikiavimas -->
            <select id="sortAnimals">
              <option value="created_at_desc">Naujausi pirmiau</option>
              <option value="name_asc">Vardas A–Ž</option>
              <option value="name_desc">Vardas Ž–A</option>
              <option value="breed_asc">Veislė A–Ž</option>
              <option value="breed_desc">Veislė Ž–A</option>
              <option value="birth_date_asc">Gimimo data ↑</option>
              <option value="birth_date_desc">Gimimo data ↓</option>
            </select>
          </div>
        </div>

        <!-- Zinute gyvunu veiksmams -->
        <p id="animalsMessage" class="shelter-message"></p>

        <!-- Dinaminis gyvunu grid -->
        <div class="cards-animal" id="animalsGrid"></div>
        <div id="animalsPagination" class="pagination"></div>
      </section>

      <!-- Gyvuno popup fonas -->
      <div class="animal-modal-backdrop" id="animalModalBackdrop" hidden>
        <!-- Popup langas -->
        <div class="animal-modal">
          <!-- Uzdarymo mygtukas -->
          <button
            class="animal-modal-close"
            id="closeAnimalModalBtn"
            type="button"
          >
            ×
          </button>

          <!-- Virsutine gyvuno nuotrauka -->
          <div class="animal-modal-image-wrap">
            <img
              id="animalModalImage"
              src="/assets/img/cat1.png"
              alt="Gyvūnas"
              class="animal-modal-image"
            />
          </div>

          <!-- Popup antraste -->
          <div class="animal-modal-header">
            <div class="animal-modal-title-wrap">
              <h2 id="animalModalTitle">Gyvūnas</h2>
              <p id="animalModalSubtitle" class="animal-modal-subtitle">-</p>
            </div>

            <!-- Popup veiksmai -->
            <div class="animal-modal-actions">
              <button class="btn" id="animalEditBtn" type="button">
                Redaguoti
              </button>

              <button class="btn" id="animalDeleteBtn" type="button">
                Ištrinti
              </button>

              <button class="btn" id="animalSaveBtn" type="button" hidden>
                Išsaugoti
              </button>

              <button class="btn" id="animalCancelBtn" type="button" hidden>
                Atšaukti
              </button>
            </div>
          </div>

          <!-- Popup turinys -->
          <div class="animal-modal-body">
            <!-- Perziuros rezimas -->
            <div id="animalViewMode">
              <div class="animal-main-info">
                <p><strong>Rūšis:</strong> <span id="animalViewSpecies">-</span></p>
                <p><strong>Veislė:</strong> <span id="animalViewBreed">-</span></p>
                <p><strong>Lytis:</strong> <span id="animalViewSex">-</span></p>
                <p><strong>Statusas:</strong> <span id="animalViewStatus">-</span></p>
                <p><strong>Gimimo data:</strong> <span id="animalViewBirthDate">-</span></p>
                <p><strong>Spalva:</strong> <span id="animalViewColor">-</span></p>
                <p><strong>Kodas:</strong> <span id="animalViewCode">-</span></p>
              </div>

              <div class="animal-description-block">
                <h3>Aprašymas</h3>
                <p id="animalViewDescription">-</p>
              </div>
            </div>

            <!-- Redagavimo ir kurimo forma -->
            <form id="animalForm" class="edit-form" hidden>
              <!-- Gyvuno vardas -->
              <label class="edit-label" for="animalNameInput">Vardas:</label>
              <input type="text" id="animalNameInput" />

              <!-- Unikalus kodas -->
              <label class="edit-label" for="animalCodeInput">Kodas:</label>
              <input type="text" id="animalCodeInput" />

              <!-- Rusis -->
              <label class="edit-label" for="animalSpeciesInput">Rūšis:</label>
              <select id="animalSpeciesInput">
                <option value="dog">Šuo</option>
                <option value="cat">Katė</option>
                <option value="other">Kitas</option>
              </select>

              <!-- Veisle -->
              <label class="edit-label" for="animalBreedInput">Veislė:</label>
              <input type="text" id="animalBreedInput" />

              <!-- Lytis -->
              <label class="edit-label" for="animalSexInput">Lytis:</label>
              <select id="animalSexInput">
                <option value="male">Patinas</option>
                <option value="female">Patelė</option>
                <option value="unknown">Nežinoma</option>
              </select>

              <!-- Statusas -->
              <label class="edit-label" for="animalStatusInput">Statusas:</label>
              <select id="animalStatusInput">
                <option value="available">Available</option>
                <option value="reserved">Reserved</option>
                <option value="adopted">Adopted</option>
                <option value="foster">Foster</option>
                <option value="medical_hold">Medical hold</option>
                <option value="lost">Lost</option>
              </select>

              <!-- Gimimo data -->
              <label class="edit-label" for="animalBirthDateInput">Gimimo data:</label>
              <input type="date" id="animalBirthDateInput" />

              <!-- Spalva -->
              <label class="edit-label" for="animalColorInput">Spalva:</label>
              <input type="text" id="animalColorInput" />

              <!-- Gyvuno nuotrauka -->
              <label class="edit-label" for="animalImageInput">Nuotrauka:</label>
              <input type="file" id="animalImageInput" accept="image/*" />

              <!-- Aprasymas -->
              <label class="edit-label" for="animalDescriptionInput">Aprašymas:</label>
              <textarea
                id="animalDescriptionInput"
                class="edit-textarea"
                rows="5"
              ></textarea>
            </form>

            <!-- Zinute popup veiksmams -->
            <p id="animalModalMessage" class="shelter-message"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer id="site-footer"></footer>

    <!-- Bendri scriptai -->
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/auth-modals.js"></script>

    <!-- Prieglaudos puslapio logika -->
     <script src="/assets/js/common.js"></script>
    <script src="/assets/js/prieglauda.js"></script>
  </body>
</html>
