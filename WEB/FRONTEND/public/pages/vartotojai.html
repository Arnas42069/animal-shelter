<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vartotojų valdymas</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/auth-modals.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />
</head>

<body>

<header id="site-navbar"></header>
<div id="auth-modals-root"></div>

<div class="container-gaps">

  <main class="main-content-admin">

    <h1></h1>

    
    <div class="search-box">

      <input
        type="text"
        id="userSearch"
        placeholder="Ieškoti pagal vardą ar prieglaudą..."
      >

      <select id="roleFilter" class="search-box">
        <option value="all">Visi</option>
        <option value="volunteer">Savanoriai</option>
        <option value="shelter">Prieglaudos</option>
        <option value="admin">Admin</option>
      </select>

    </div>

    
    <h2>Vartotojai</h2>

    <table class="table-admin" id="usersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Vardas Pavardė</th>
          <th>Naudotojo vardas</th>
          <th>El. paštas</th>
          <th>Rolė</th>
          <th>Statusas</th>
          <th>Veiksmai</th>
        </tr>
      </thead>

      <tbody id="usersTableBody"></tbody>

    </table>

  </main>

</div>

<div id="admin-toast" class="admin-toast"></div>


<footer id="site-footer"></footer>

<script src="/assets/js/auth.js"></script>
<script src="/assets/js/navbar.js"></script>
<script src="/assets/js/footer.js"></script> 
<script src="/assets/js/auth-modals.js"></script>
<script src="/assets/js/admin-users.js"></script>

</body>
</html>
