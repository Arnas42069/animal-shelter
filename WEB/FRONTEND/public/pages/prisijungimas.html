<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <title>Prisijungimas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/login-reg.css" />
  </head>

  <body>
    <div class="top-buttons">
      <a class="btn" href="/index.html">Atgal</a>
    </div>

    <div class="auth-page">
      <div class="container">
        <h2>PRISIJUNGIMAS</h2>

        <form id="loginForm">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="el. paštas"
            required
          />

          <input
            type="password"
            id="password"
            name="password"
            placeholder="slaptažodis"
            required
          />

          <button
            type="submit"
            class="btn"
            style="display: block; margin: 10px auto;"
          >
            Prisijungti
          </button>
        </form>

        <p class="forgot">
          <a href="">Pamiršote slaptažodį?</a>
        </p>

        <p id="message"></p>

        <a class="btn" href="/pages/registracija.html">Registracija</a>
      </div>
    </div>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/prisijungimas.js"></script>
  </body>
</html>
