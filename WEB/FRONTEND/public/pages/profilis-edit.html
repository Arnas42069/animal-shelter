<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Profilis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/profilis.css" />
  </head>

  <body>
    
    <div class="profile-container">
      <!--titulas puslapio-->
      <p class="edit-title">Edit Profile</p>
      <!--redagavimo laukai-->
      <form class="edit-form">
        <input type="text" placeholder="Vardas" class="edit-input"/>
        <input type="text" placeholder="Pavardė" class="edit-input"/>
        <input type="date" class="edit-input"/>
        <textarea placeholder="Aprašymas" class="edit-textarea"></textarea>
      </form>
      <!--mygtukas save-->
      <button onclick="location.href='/pages/profilis.html'" class="btn">Save</button>
    </div>
  </body>
</html>
