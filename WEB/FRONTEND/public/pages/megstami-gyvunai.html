<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mėgstami gyvūnai</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/megstami-gyvunai.css" />
    <link rel="stylesheet" href="/assets/css/navbar.css" />
    <link rel="stylesheet" href="/assets/css/auth-modals.css" />
    <link rel="stylesheet" href="/assets/css/footer.css" />
  </head>
  <body>
    <header id="site-navbar"></header>
    <div id="auth-modals-root"></div>

    <div class="container-gaps">
      <header class="loved-startEnd">
        <h2 class="h2">Pamėgti gyvūnai</h2>
      </header>

      <main>
        <section class="animals">
          <div class="animals-toolbar">
            <input
              id="animalSearchInput"
              class="animal-search-input"
              type="search"
              placeholder="Ieškoti pagal vardą arba veislę"
            />

            <select id="animalShelterFilter">
              <option value="">Visos prieglaudos</option>
            </select>

            <select id="animalSpeciesFilter">
              <option value="">Rūšis</option>
              <option value="dog">Šuo</option>
              <option value="cat">Katė</option>
            </select>

            <select id="animalGenderFilter">
              <option value="">Lytis</option>
              <option value="male">Patinas</option>
              <option value="female">Patelė</option>
            </select>

            <select id="animalStatusFilter">
              <option value="">Statusas</option>
              <option value="available">Ieško namų</option>
              <option value="reserved">Rezervuotas</option>
              <option value="adopted">Surado namus</option>
              <option value="foster">Laikinoje globoje</option>
              <option value="medical_hold">Gydomas</option>
            </select>

            <select id="animalSortOrder">
              <option value="desc">Naujausi pirmiau</option>
              <option value="asc">Seniausi pirmiau</option>
            </select>
          </div>

          <div class="cards-animal" id="animalCardsContainer">
            <!-- Pamėgtų gyvūnų kortelės bus sugeneruotos per JS -->
          </div>

          <div class="pagination" id="animalsPagination">
            <!-- Puslapiavimas bus sugeneruotas per JS -->
          </div>
        </section>

        <header class="loved-startEnd">
          <a class="btn" href="/index.html#gyvunai">Peržiūrėti visus gyvūnus</a>
        </header>
      </main>
    </div>

    <footer id="site-footer"></footer>

    <div class="animal-modal-backdrop" id="animalModalBackdrop" hidden>
      <div class="animal-modal">
        <button class="animal-modal-close" id="animalModalCloseBtn" type="button">×</button>

        <div class="animal-modal-layout">
          <div class="animal-modal-image-panel">
            <img
              id="animalModalImage"
              class="animal-modal-image"
              src="/assets/img/cat1.png"
              alt="Gyvūnas"
            />
          </div>

          <div class="animal-modal-info">
            <h2 class="animal-modal-title">
              <span id="animalModalName">Gyvūnas</span>
              <span id="animalModalAge" class="animal-age" hidden></span>
              <button
                class="favorite-btn animal-modal-favorite active"
                id="animalModalFavorite"
                type="button"
                title="Pašalinti iš mėgstamų"
              >
                ❤️
              </button>
            </h2>

            <div class="animal-modal-grid">
              <p><strong>Prieglauda:</strong> <span id="animalModalShelter">-</span></p>
              <p><strong>Rūšis:</strong> <span id="animalModalSpecies">-</span></p>
              <p><strong>Veislė:</strong> <span id="animalModalBreed">-</span></p>
              <p><strong>Lytis:</strong> <span id="animalModalGender">-</span></p>
              <p><strong>Statusas:</strong> <span id="animalModalStatus">-</span></p>
              <p><strong>Spalva:</strong> <span id="animalModalColor">-</span></p>
              <p><strong>Amžius:</strong> <span id="animalModalBirthDate">-</span></p>
            </div>

            <div class="animal-modal-description">
              <h3>Aprašymas</h3>
              <p id="animalModalDescription">-</p>
            </div>

            <a href="/pages/laikina-globa-forma.html" class="btn" id="fosterLinkBtn">
              Priglausti trumpalaikei globai
            </a>
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/auth-modals.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/megstami-gyvunai.js"></script>
  </body>
</html>
