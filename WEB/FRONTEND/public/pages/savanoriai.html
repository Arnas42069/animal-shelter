<!DOCTYPE html>
<html lang="lt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prieglaudos savanoriai</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/navbar.css" />
  <link rel="stylesheet" href="/assets/css/auth-modals.css" />
  <link rel="stylesheet" href="/assets/css/footer.css" />
  <link rel="stylesheet" href="/assets/css/savanoriai.css" />
</head>

<body>
  <header id="site-navbar"></header>
  <div id="auth-modals-root"></div>

  <main class="container-gaps shelter-volunteers-page" id="shelterVolunteersPage">
    <section class="volunteers-admin-hero">
      <div class="admin-summary-grid" aria-label="Savanorių suvestinė">
        <div class="admin-summary-card">
          <img src="/assets/svg/paw-outline.svg" alt="Pėdutės" class="summary-paw-icon" />
          <p>Laukia savanorystės:</p>
          <strong id="pendingVisitsCount">0</strong>
        </div>

        <div class="admin-summary-card">
          <img src="/assets/svg/paw2.svg" alt="Pėdutės" class="summary-paw-icon" />
          <p>Esami savanoriai:</p>
          <strong id="activeVisitsCount">0</strong>
        </div>

        <div class="admin-summary-card">
          <img src="/assets/svg/paw-outline.svg" alt="Pėdutės" class="summary-paw-icon" />
          <p>Laukia globos:</p>
          <strong id="pendingFostersCount">0</strong>
        </div>
      </div>
    </section>

    <section class="management-section volunteer-management-section">
      <div class="management-section-header">
        <div>
          <h2>Paprasti savanoriai</h2>
        </div>

        <div class="management-tabs" aria-label="Savanorystės filtrai">
          <button type="button" class="management-tab" data-visit-filter="pending">
            Laukia
          </button>
          <button type="button" class="management-tab active" data-visit-filter="active">
            Esami
          </button>
          <button type="button" class="management-tab" data-visit-filter="archive">
            Archyvas
          </button>
        </div>
      </div>

      <div class="management-toolbar" aria-label="Savanorių paieška ir rikiavimas">
        <input
          id="visitSearchInput"
          class="management-search"
          type="search"
          placeholder="Ieškoti pagal vardą arba pavardę"
        />

        <select id="visitSortSelect" class="management-sort">
          <option value="date_desc">Naujausi pirmiau</option>
          <option value="date_asc">Seniausi pirmiau</option>
          <option value="name_asc">A-Z pagal vardą</option>
          <option value="name_desc">Z-A pagal vardą</option>
        </select>
      </div>

      <div id="visitsList" class="management-list"></div>
    </section>

    <section class="management-section foster-management-section">
      <div class="management-section-header">
        <div>
          <h2>Trumpalaikės globos prašymai</h2>
        </div>

        <div class="management-tabs" aria-label="Globos filtrai">
          <button type="button" class="management-tab active" data-foster-filter="pending">
            Laukia
          </button>
          <button type="button" class="management-tab" data-foster-filter="active">
            Patvirtinti
          </button>
          <button type="button" class="management-tab" data-foster-filter="archive">
            Archyvas
          </button>
        </div>
      </div>

      <div id="fostersList" class="management-list"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/navbar.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script src="/assets/js/auth-modals.js"></script>
  <script src="/assets/js/savanoriai.js"></script>
</body>

</html>
