<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <title>Profilis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Profilio puslapio stiliai -->
    <link rel="stylesheet" href="/assets/css/profilis.css" />

    <!-- Bendri puslapio komponentu stiliai -->
    <link rel="stylesheet" href="/assets/css/navbar.css" />
    <link rel="stylesheet" href="/assets/css/auth-modals.css" />
    <link rel="stylesheet" href="/assets/css/footer.css" />
  </head>

  <body>
    <!-- Navbar vieta -->
    <header id="site-navbar"></header>

    <!--
      Pagrindinis profilio puslapio blokas
      container-gaps duoda sviesu centra
      body fonas duoda pilkus sonus
    -->
    <main class="container-gaps profile-page" id="volunteerProfilePage">
      <!-- Pagrindine profilio kortele -->
      <section class="profile-card">
        <!-- Profilio nuotrauka -->
        <div class="profile-picture">
          <img src="/assets/img/profile.png" alt="Profilio nuotrauka" />
        </div>

        <!--
          Inline profilio forma
          Tie patys laukai naudojami ir perziurai ir redagavimui
        -->
        <form id="profileInlineForm" class="profile-inline-form">
          <div class="profile-identity-view">
            <h1 class="profile-title" id="profileFullName">Mano profilis</h1>
            <div class="profile-email-line">
              <svg
                viewBox="0 0 24 24"
                aria-hidden="true"
                class="profile-email-icon"
              >
                <path
                  d="M4 6h16v12H4z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="m4.5 7 7.5 6 7.5-6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span id="profileEmailText">-</span>
            </div>
          </div>

          <div class="profile-info-list" id="profileEditFields" hidden>
            <label class="profile-row">
              <span class="profile-label">Vardas</span>
              <input
                type="text"
                id="editName"
                class="profile-inline-input"
                readonly
              />
            </label>

            <label class="profile-row">
              <span class="profile-label">Pavardė</span>
              <input
                type="text"
                id="editSurname"
                class="profile-inline-input"
                readonly
              />
            </label>

            <label class="profile-row">
              <span class="profile-label">El. paštas</span>
              <input
                type="email"
                id="editEmail"
                class="profile-inline-input"
                readonly
              />
            </label>
          </div>

          <!-- Pagrindiniai veiksmai -->
          <div class="profile-actions">
            <!-- Ijungia arba isjungia redagavimo rezima -->
            <button type="button" class="btn" id="toggleEditBtn">
              Redaguoti
            </button>

            <!-- Rodomas tik tada kai ijungtas redagavimas -->
            <button type="submit" class="btn" id="saveProfileBtn" hidden>
              Išsaugoti
            </button>

            <!-- Parodo arba paslepia slapta sekcija -->
            <button type="button" class="btn btn-secondary" id="togglePasswordBtn">
              Keisti slaptažodį
            </button>

            <button type="button" class="btn btn-delete-inline" id="deleteAccountBtn">
              Ištrinti paskyrą
            </button>
          </div>
        </form>

        <!-- Klaidu arba sekmes zinutes -->
        <p id="profileMessage" class="profile-message"></p>
      </section>

      <!-- Tik savanorio rolei rodoma socialiniu valandu ir istorijos sekcija -->
      <section class="volunteer-history-section" id="volunteerHistorySection" hidden>
        <div class="volunteer-history-header">
          <h2 class="section-title">Savanoriavimo istorija</h2>
          <div class="history-meta">
            <span id="completedVisitsCount" class="history-count">0 registracijų</span>
            <span class="history-count history-hours-count">
              <span>Sukaupta</span>
              <strong id="totalSocialHours">0 val.</strong>
            </span>
          </div>
        </div>

        <div class="volunteer-history-controls">
          <input
            type="search"
            id="volunteerHistorySearch"
            class="history-search-input"
            placeholder="Ieškoti pagal prieglaudos pavadinimą"
          />

          <select id="volunteerHistorySort" class="history-sort-select">
            <option value="date-desc">Naujausi pirmiau</option>
            <option value="date-asc">Seniausi pirmiau</option>
          </select>
        </div>

        <div id="volunteerHistoryList" class="volunteer-history-list"></div>
      </section>

      <!-- Slaptazodzio keitimo modalas -->
      <section
        class="password-modal"
        id="passwordSection"
        aria-modal="true"
        role="dialog"
        hidden
      >
        <div class="password-modal-card">
          <button
            type="button"
            class="modal-close-btn"
            id="closePasswordBtn"
            aria-label="Uždaryti slaptažodžio keitimą"
          >
            ×
          </button>

          <h2 class="section-title">Slaptažodžio keitimas</h2>

          <form id="passwordForm" class="profile-form">
            <input
              type="password"
              id="newPassword"
              class="edit-input"
              placeholder="Naujas slaptažodis"
              required
            />

            <input
              type="password"
              id="repeatPassword"
              class="edit-input"
              placeholder="Pakartokite naują slaptažodį"
              required
            />

            <label class="checkbox-row">
              <input type="checkbox" id="showPasswords" />
              <span>Rodyti slaptažodį</span>
            </label>

            <div class="form-actions">
              <button type="submit" class="btn">Pakeisti slaptažodį</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <!-- Footer vieta -->
    <footer id="site-footer"></footer>

    <!-- Bendri scriptai -->
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/footer.js"></script>

    <!-- Profilio puslapio logika -->
    <script src="/assets/js/profile.js"></script>
  </body>
</html>
