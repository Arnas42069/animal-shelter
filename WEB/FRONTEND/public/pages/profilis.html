<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <title>Profilis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/profilis.css" />
  </head>

  <body>
    <!--atgal mygtukas-->
    <div class="top-buttons">
      <a class="btn" href="index.html">Atgal</a>
    </div>
    
    <div class="profile-container">
      <!--Nuotrauka profilio-->
      <div class="profile-picture">
        <img src="/assets/img/profile.png" alt="Profile picture" />
      </div>

      <!--informacijos sąrašas-->
      <div class="profile-content">
        <div class="profile-info">
          <p><strong>VARDAS</strong></p>
          <p><strong>PAVARDĖ</strong></p>
          <p><strong>GIMIMO DATA</strong></p>
          <p><strong>APRAŠYMAS</strong></p>

          <p class="profile-text">
            Trumpas vartotojo aprašymas apie save, pomėgius ar kitą informaciją.
          </p>
        </div>

        <!--save mygtukas-->
        <a href="/pages/profilis-edit.html" class="btn">Edit</a>
      </div>
    </div>
  </body>
</html>
