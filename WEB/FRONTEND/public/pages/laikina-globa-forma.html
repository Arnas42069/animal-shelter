<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laikinos globos forma</title>

    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/navbar.css">
    <link rel="stylesheet" href="/assets/css/auth-modals.css">
    <link rel="stylesheet" href="/assets/css/footer.css">
</head>

<body>
    <header id="site-navbar"></header>
    <div id="auth-modals-root"></div>

    <div class="container-gaps">

        <!-- SELECTED ANIMAL -->
        <section class="selected-animal-section">
            <h1>Laikinos globos paraiška</h1>
            <div class="selected-animal-card">
                <img id="selectedAnimalImage" src="/assets/img/animal_image_unavalible.jpg"/>
                <div class="animal-info">
                <h2 id="selectedAnimalName">-</h2>

                <div class="animal-details-grid">

                <p><strong>Prieglauda:</strong> <span id="selectedAnimalShelter">-</span></p>
                <p><strong>Rūšis:</strong> <span id="selectedAnimalSpecies">-</span></p>
                <p><strong>Veislė:</strong> <span id="selectedAnimalBreed">-</span></p>
                <p><strong>Lytis:</strong> <span id="selectedAnimalGender">-</span></p>
                <p><strong>Statusas:</strong> <span id="selectedAnimalStatus">-</span></p>
                <p><strong>Spalva:</strong> <span id="selectedAnimalColor">-</span></p>
                <p><strong>Gimimo data:</strong> <span id="selectedAnimalBirthDate">-</span></p>
                <p><strong>Kodas:</strong> <span id="selectedAnimalCode">-</span></p>

                </div>


                </div>
            </div>
        </section>
        <section class="shelter-contact-section">
            <h2>Prieglaudos kontaktai</h2>

            <p><strong>Pavadinimas:</strong> Penkta Koja</p>
            <p><strong>Telefonas:</strong> +37060000000</p>
            <p><strong>Email:</strong> info@penktakoja.lt</p>

            <a href="prieglauda.html" class="btn">
                Peržiūrėti prieglaudos profilį
            </a>
        </section>


        <!-- APPLICATION FORM -->
        <section class="foster-form-section" id="fosterFormSection">
            <h2>Užpildykite paraišką</h2>
            <form id="fosterForm">
                <input id="fosterName" type="text" placeholder="Vardas" required>
                <input id="fosterSurname" type="text" placeholder="Pavardė" required>
                <input id="fosterPhone" type="tel" placeholder="Telefono numeris">
                <input id="fosterEmail" type="email" placeholder="El. paštas" required>

                <label for="fosterStartDate">
                    Pageidaujama globos pradžia
                </label>

                <input
                    id="fosterStartDate"
                    type="date"
                    required
                >

                <label for="fosterEndDate">
                    Pageidaujama globos pabaiga (nebūtina)
                </label>

                <input
                    id="fosterEndDate"
                    type="date"
                >

                <textarea 
                    id="fosterNote"
                    placeholder="Papildoma informacija (nebūtina)"
                ></textarea>

                <p id="fosterFormMessage"></p>

                <button id="fosterSubmitBtn" type="submit" class="btn">
                    Pateikti paraišką
                </button>
            </form>
        </section>

    </div>

    <footer id="site-footer"></footer>

    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/navbar.js"></script>
    <script src="/assets/js/footer.js"></script>
    <script src="/assets/js/auth-modals.js"></script>
    
    <!-- svarbiausias -->
    <script src="/assets/js/temp-foster.js"></script>

</body>
</html>
